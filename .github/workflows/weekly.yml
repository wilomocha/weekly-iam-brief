name: Weekly content update

on:
  schedule:
    # Every Monday at 07:00 UTC
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate feed + comic
        run: node scripts/generate-weekly.mjs
        env:
          AI_API_KEY:  ${{ secrets.AI_API_KEY }}
          AI_PROVIDER: ${{ vars.AI_PROVIDER }}   # repo variable, default empty → anthropic
          AI_MODEL:    ${{ vars.AI_MODEL }}       # optional model override
          AI_BASE_URL: ${{ vars.AI_BASE_URL }}    # required only for openai-compatible

      - name: Commit updated content
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/feed.json public/comics.json
          if git diff --cached --quiet; then
            echo "No content changes to commit."
          else
            WEEK=$(date +%V)
            git commit -m "Weekly update — week ${WEEK}"
            git push origin main
          fi
